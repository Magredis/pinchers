<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Пинчеры на базе — Fantasy MLB 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafaf9;--bg2:#f5f5f4;--bg3:#e7e5e4;--card:#fff;--text:#1c1917;--text2:#78716c;--text3:#a8a29e;--border:#e7e5e4;--border2:#d6d3d1;--accent:#7c3aed;--accent-bg:#f5f3ff;--gold:#f59e0b;--success:#16a34a;--danger:#dc2626;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1c1917;--bg2:#292524;--bg3:#44403c;--card:#292524;--text:#fafaf9;--text2:#a8a29e;--text3:#78716c;--border:#44403c;--border2:#57534e;--accent:#a78bfa;--accent-bg:rgba(167,139,250,0.1);--gold:#fbbf24;--success:#4ade80;--danger:#f87171}}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:20px;max-width:1440px;margin:0 auto}
h1{font-size:22px;font-weight:700;margin-bottom:2px;letter-spacing:-0.3px}
.sub{font-size:13px;color:var(--text2);margin-bottom:20px}
h2{font-size:13px;font-weight:600;margin:28px 0 8px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text2)}
.page{display:none}.page.active{display:block}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.controls label{font-size:11px;color:var(--text3);font-weight:500}
.wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);background:var(--card);margin-bottom:4px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{border-collapse:collapse;width:100%;font-size:12px}
thead th{padding:8px 6px;font-weight:600;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;text-align:center;background:var(--card);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:2}
thead th.sec{color:var(--accent);background:var(--accent-bg);border-bottom:2px solid var(--accent);font-weight:700;letter-spacing:.8px}
th.name,td.name{text-align:left;min-width:170px;position:sticky;left:0;z-index:1;background:var(--card)}
th.name{z-index:3}
td{padding:6px 6px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;font-size:12px;font-variant-numeric:tabular-nums}
td.name{font-weight:600}
tr:hover td{background:var(--bg2)!important}
.mgr{color:var(--text3);font-size:10px;font-weight:400}
.pct{font-weight:700;font-size:13px}.wlt{font-size:10px;color:var(--text3)}
.medal{font-weight:800;font-size:15px;color:var(--gold)}
.summary td{font-size:11px;font-weight:600;background:var(--bg2)!important}
.summary td.name{background:var(--bg2)!important}
.s-best td{color:var(--success)}.s-avg td{color:var(--text2)}.s-worst td{color:var(--danger)}
select{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:500}
.legend{margin-top:8px;margin-bottom:16px;font-size:11px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:4px}
.leg-box{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.06)}
.h2h-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.h2h-score{font-weight:800;font-size:22px;letter-spacing:1px;padding:4px 16px;border-radius:8px;background:var(--bg2)}
.h2h-win{background:rgba(74,222,128,0.15);font-weight:700}
.h2h-lose{background:rgba(248,113,113,0.1)}
.h2h-tie{color:var(--text3)}
.h2h-section-break{border-top:2px solid var(--accent)!important}
th.sortable{cursor:pointer}
th.sortable:hover{color:var(--accent)}
@media(max-width:700px){
  body{padding:12px 8px}
  h1{font-size:18px}
  .sub{font-size:11px;margin-bottom:12px}
  h2{font-size:11px;margin:20px 0 6px}
  .tabs{gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:8px 14px;font-size:12px;white-space:nowrap;flex-shrink:0}
  .controls{gap:6px;margin-bottom:10px}
  select{font-size:11px;padding:4px 8px}
  table{font-size:11px}
  thead th{padding:5px 3px;font-size:9px;letter-spacing:.3px}
  td{padding:4px 3px;font-size:11px}
  th.name,td.name{min-width:120px;max-width:140px;font-size:11px}
  .mgr{font-size:9px}
  .pct{font-size:11px}
  .wlt{font-size:9px}
  .medal{font-size:13px}
  .wrap{border-radius:8px}
  .legend{font-size:10px;gap:8px}
  .leg-box{width:12px;height:12px}
  .h2h-header{flex-direction:column;align-items:stretch;gap:8px}
  .h2h-header select{width:100%;font-size:13px!important;padding:10px 12px!important}
  .h2h-header>span:first-of-type{text-align:center}
  .h2h-score{text-align:center;font-size:20px}
  .summary td{font-size:10px}
}</style>
</head>

const isDark=()=>matchMedia('(prefers-color-scheme:dark)').matches;

// --- UTILS ---
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('on');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='h2h')renderH2H();
  if(tab==='power')renderPower();
}

function getVal(t,sid){
  if(sid==="3"){
    const hab=t.stats["60"];
    if(hab&&hab.includes("/")){const p=hab.split("/");const h=parseFloat(p[0]),ab=parseFloat(p[1]);if(ab>0)return h/ab;}
  }
  return parseFloat(t.stats[sid])||0;
}

function getRanks(teams,sid){
  const m=SM[sid];if(!m||!m.b)return {};
  const vals=teams.map(t=>({id:t.id,v:getVal(t,sid)}));
  vals.sort((a,b)=>m.b==="hi"?b.v-a.v:a.v-b.v);
  if(sid==="31"&&vals.every(x=>x.v===0)){const r={};vals.forEach(x=>r[x.id]=6);return r;}
  const r={};let i=0;
  while(i<vals.length){let j=i;while(j<vals.length&&vals[j].v===vals[i].v)j++;for(let k=i;k<j;k++)r[vals[k].id]=i+1;i=j;}
  return r;
}

function colorForRank(rank,n){
  if(rank===1)return isDark()?"rgba(251,191,36,0.3)":"rgba(245,158,11,0.22)";
  if(rank===n)return"transparent";
  if(n<=2)return"transparent";
  const t=(rank-2)/(n-3);
  if(isDark()){return`rgba(${Math.round(74+t*106)},${Math.round(180-t*106)},100,${(0.3-t*0.05).toFixed(2)})`;}
  return`rgb(${Math.round(187+t*65)},${Math.round(232-t*32)},${Math.round(195+t*5)})`;
}

function goldTxt(rank){return rank===1?`font-weight:800;color:${isDark()?'#fbbf24':'#b45309'}`:"";}
function fmtS(sid,v){if(sid==="3")return v.toFixed(3).replace(/^0/,"");if(sid==="26")return v.toFixed(2);return Math.round(v);}
function fmtWLT(r){if(!r)return'<span style="color:var(--text3)">—</span>';return`<span style="color:var(--success);font-weight:700">${r.w}</span><span style="color:var(--text3)">-</span><span style="color:var(--danger);font-weight:600">${r.l}</span><span style="color:var(--text3)">-</span><span style="color:var(--text3)">${r.t}</span>`;}

function simMatchup(a,b){
  let w=0,l=0,t=0;
  ALL_S.forEach(sid=>{
    const m=SM[sid];if(!m||!m.b)return;
    const vA=getVal(a,sid),vB=getVal(b,sid);
    if(sid==="31"&&vA===0&&vB===0){t++;return;}
    if(m.b==="hi"?vA>vB:vA<vB)w++;else if(m.b==="hi"?vB>vA:vB<vA)l++;else t++;
  });
  return{w,l,t};
}

function simAll(team,allTeams){
  let tw=0,tl=0,tt=0;
  allTeams.forEach(opp=>{if(opp.id===team.id)return;const r=simMatchup(team,opp);if(r.w>r.l)tw++;else if(r.l>r.w)tl++;else tt++;});
  return{w:tw,l:tl,t:tt};
}

// --- LEAGUE STATS ---
function render(){
  const period=document.getElementById("period").value;
  const teams=WEEKS_DATA[period];if(!teams)return;
  const n=teams.length;
  const allR={};ALL_S.forEach(s=>allR[s]=getRanks(teams,s));
  const medals={};teams.forEach(t=>medals[t.id]=0);
  ALL_S.forEach(s=>{if(s==="31"&&teams.every(t=>(parseFloat(t.stats[s])||0)===0))return;const r=allR[s];teams.forEach(t=>{if(r[t.id]===1)medals[t.id]++;});});
  const sorted=[...teams].sort((a,b)=>a.name.localeCompare(b.name));

  let h=`<thead><tr><th class='name'>Team</th><th>W-L-T</th><th class='sec' colspan='${BAT.length}'>Batting</th><th class='sec' colspan='${PIT.length}'>Pitching</th><th>🏅</th></tr><tr><th class='name'></th><th>PCT</th>`;
  ALL_IDS.forEach(s=>h+=`<th>${SM[s]?.n||s}</th>`);
  h+="<th>#1</th></tr></thead><tbody>";
  sorted.forEach(t=>{
    h+="<tr>";
    h+=`<td class='name'>${t.name}<br><span class='mgr'>${t.mgr} · Div ${t.div}</span></td>`;
    h+=`<td><span class='pct'>${t.pct}</span><br><span class='wlt'>${t.w}-${t.l}-${t.t}</span></td>`;
    ALL_IDS.forEach(s=>{const v=t.stats[s]||"—";const sc=SM[s].scoring!==false;const rk=sc?allR[s]?.[t.id]:null;const bg=rk?colorForRank(rk,n):"transparent";h+=`<td style="background:${bg};${rk?goldTxt(rk):""}">${v}</td>`;});
    h+=`<td class='medal'>${medals[t.id]||0}</td></tr>`;
  });
  const vs=sid=>teams.map(t=>parseFloat(t.stats[sid])||0);
  [["s-best","Best",(s,v)=>{const m=SM[s];return m.b==="hi"?Math.max(...v):Math.min(...v);}],["s-avg","Average",(s,v)=>v.reduce((a,b)=>a+b,0)/v.length],["s-worst","Worst",(s,v)=>{const m=SM[s];return m.b==="hi"?Math.min(...v):Math.max(...v);}]].forEach(([cls,label,fn])=>{
    h+=`<tr class='summary ${cls}'><td class='name'>${label}</td><td></td>`;
    ALL_IDS.forEach(s=>{if(SM[s].scoring===false){h+="<td></td>";return;}h+=`<td>${fmtS(s,fn(s,vs(s)))}</td>`;});
    h+="<td></td></tr>";
  });
  h+="</tbody>";document.getElementById("tbl").innerHTML=h;

  // Rankings
  let h2=`<thead><tr><th class='name'>Team</th><th class='sec' colspan='${BAT_S.length}'>Batting</th><th class='sec' colspan='${PIT_S.length}'>Pitching</th></tr><tr><th class='name'></th>`;
  ALL_S.forEach(s=>h2+=`<th>${SM[s]?.n||s}</th>`);
  h2+="</tr></thead><tbody>";
  sorted.forEach(t=>{h2+=`<tr><td class='name'>${t.name}<br><span class='mgr'>${t.mgr}</span></td>`;ALL_S.forEach(s=>{const rk=allR[s]?.[t.id]||"—";const bg=typeof rk==="number"?colorForRank(rk,n):"transparent";h2+=`<td style="background:${bg};${typeof rk==="number"?goldTxt(rk):""}">${rk}</td>`;});h2+="</tr>";});
  h2+="</tbody>";document.getElementById("tblRank").innerHTML=h2;

  // Avg ranks
  const avgD=sorted.map(t=>{const bR=BAT_S.map(s=>allR[s]?.[t.id]||n),pR=PIT_S.map(s=>allR[s]?.[t.id]||n);return{id:t.id,name:t.name,mgr:t.mgr,bAvg:bR.reduce((a,b)=>a+b,0)/bR.length,pAvg:pR.reduce((a,b)=>a+b,0)/pR.length,tAvg:[...bR,...pR].reduce((a,b)=>a+b,0)/[...bR,...pR].length};});
  function rkAvg(arr,key){const s=[...arr].sort((a,b)=>a[key]-b[key]);const r={};s.forEach((x,i)=>r[x.id]=i+1);return r;}
  const bAR=rkAvg(avgD,"bAvg"),pAR=rkAvg(avgD,"pAvg"),tAR=rkAvg(avgD,"tAvg");
  let h3="<thead><tr><th class='name'>Team</th><th>Batting</th><th>Pitching</th><th>Total</th></tr></thead><tbody>";
  avgD.forEach(t=>{h3+=`<tr><td class='name'>${t.name}<br><span class='mgr'>${t.mgr}</span></td>`;
    [[bAR,t.bAvg],[pAR,t.pAvg],[tAR,t.tAvg]].forEach(([rMap,val])=>{const r=rMap[t.id];h3+=`<td style="background:${colorForRank(r,n)};${goldTxt(r)}">${val.toFixed(1)}</td>`;});
    h3+="</tr>";});
  h3+="</tbody>";document.getElementById("tblAvg").innerHTML=h3;
}

// --- HEAD TO HEAD ---
let h2hInit=false;
function renderH2H(){
  const period=document.getElementById("period-h2h").value;
  const teams=WEEKS_DATA[period];if(!teams)return;
  const selA=document.getElementById("h2h-a"),selB=document.getElementById("h2h-b");
  if(!h2hInit){
    const byName=[...teams].sort((a,b)=>a.name.localeCompare(b.name));
    byName.forEach(t=>{selA.innerHTML+=`<option value="${t.id}"${t.id===2?" selected":""}>${t.name}</option>`;selB.innerHTML+=`<option value="${t.id}"${t.id===5?" selected":""}>${t.name}</option>`;});
    h2hInit=true;
  }
  const tA=teams.find(t=>t.id===parseInt(selA.value)),tB=teams.find(t=>t.id===parseInt(selB.value));
  if(!tA||!tB)return;
  let wins=0,losses=0,ties=0,rows="";
  ALL_S.forEach(sid=>{
    const m=SM[sid];if(!m||!m.b)return;
    const vA=getVal(tA,sid),vB=getVal(tB,sid);
    const secBrk=sid===PIT_S[0]?" h2h-section-break":"";
    if(sid==="31"&&vA===0&&vB===0){ties++;rows+=`<tr><td style="font-weight:600;color:var(--text2);text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:.3px" class="${secBrk}">${m.n}</td><td class="h2h-tie${secBrk}" style="text-align:center">${tA.stats[sid]||"0"}</td><td style="text-align:center;color:var(--text3);font-size:11px" class="${secBrk}">—</td><td class="h2h-tie${secBrk}" style="text-align:center">${tB.stats[sid]||"0"}</td></tr>`;return;}
    let aW=m.b==="hi"?vA>vB:vA<vB,bW=m.b==="hi"?vB>vA:vB<vA;
    if(aW)wins++;else if(bW)losses++;else ties++;
    const cA=aW?"h2h-win":bW?"h2h-lose":"h2h-tie",cB=bW?"h2h-win":aW?"h2h-lose":"h2h-tie";
    const arrow=aW?"◀":bW?"▶":"=",arrowCol=aW?"color:var(--success)":bW?"color:var(--danger)":"color:var(--text3)";
    rows+=`<tr><td style="font-weight:600;color:var(--text2);text-align:center;font-size:12px;text-transform:uppercase;letter-spacing:.3px" class="${secBrk}">${m.n}</td><td class="${cA}${secBrk}" style="text-align:center;padding:8px 12px;font-size:13px">${tA.stats[sid]||"0"}</td><td style="text-align:center;${arrowCol};font-size:11px" class="${secBrk}">${arrow}</td><td class="${cB}${secBrk}" style="text-align:center;padding:8px 12px;font-size:13px">${tB.stats[sid]||"0"}</td></tr>`;
  });
  document.getElementById("tblH2H").innerHTML=`<thead><tr><th style="width:80px">Cat</th><th style="min-width:120px">${tA.name}</th><th style="width:40px"></th><th style="min-width:120px">${tB.name}</th></tr></thead><tbody>${rows}</tbody>`;
  const sc=wins>losses?"color:var(--success)":wins<losses?"color:var(--danger)":"color:var(--text2)";
  document.getElementById("h2h-score").innerHTML=`<span style="${sc}">${wins} - ${losses} - ${ties}</span>`;
}

// --- POWER RANKINGS ---
let powerSortCol="season",powerSortDir=1;

function renderPower(){
  const wks=Object.keys(WEEKS_DATA).filter(k=>k!=="season"&&WEEKS_DATA[k]).sort((a,b)=>parseInt(a)-parseInt(b));
  const seasonTeams=WEEKS_DATA["season"];if(!seasonTeams)return;
  const sims={};
  seasonTeams.forEach(t=>{sims[t.id]={name:t.name,mgr:t.mgr};});
  wks.forEach(wk=>{const teams=WEEKS_DATA[wk];if(!teams)return;teams.forEach(t=>{if(!sims[t.id])sims[t.id]={name:t.name,mgr:t.mgr};sims[t.id][wk]=simAll(t,teams);});});
  Object.keys(sims).forEach(id=>{let sw=0,sl=0,st=0;wks.forEach(wk=>{const s=sims[id][wk];if(s){sw+=s.w;sl+=s.l;st+=s.t;}});sims[id].season={w:sw,l:sl,t:st};});

  const sorted=Object.keys(sims).map(id=>({id:parseInt(id),...sims[id]}));
  sorted.sort((a,b)=>{const wc=powerSortCol==="season"?wks.length:1;const pA=a[powerSortCol]?(a[powerSortCol].w+a[powerSortCol].t*0.5)/(11*wc):-1;const pB=b[powerSortCol]?(b[powerSortCol].w+b[powerSortCol].t*0.5)/(11*wc):-1;return powerSortDir*(pB-pA);});

  const sortIco=col=>{if(powerSortCol!==col)return' <span style="opacity:0.3;font-size:8px">▼</span>';return powerSortDir===1?' <span style="font-size:8px">▼</span>':' <span style="font-size:8px">▲</span>';};
  const fmtPct=(r,w)=>{if(!r)return"";const n=11*w;if(!n)return"";return`<div style="font-size:10px;color:var(--text3);margin-top:1px">${((r.w+r.t*0.5)/n).toFixed(3).replace(/^0/,"")}</div>`;};

  let h=`<thead><tr><th style="text-align:left;width:30px">#</th><th style="text-align:left;min-width:170px">Team</th><th class="sortable" style="background:var(--bg2)" onclick="togglePowerSort('season')">Season${sortIco("season")}</th>`;
  wks.forEach(wk=>h+=`<th class="sortable" style="border-left:1px solid var(--border)" onclick="togglePowerSort('${wk}')">Wk ${wk}${sortIco(wk)}</th>`);
  h+="</tr></thead><tbody>";
  sorted.forEach((t,i)=>{
    h+=`<tr><td style="text-align:left;font-weight:700;color:var(--text3)">${i+1}</td>`;
    h+=`<td style="text-align:left;font-weight:600">${t.name}<br><span style="color:var(--text3);font-size:10px;font-weight:400">${t.mgr}</span></td>`;
    h+=`<td style="background:var(--bg2);font-weight:600">${fmtWLT(t.season)}${fmtPct(t.season,wks.length)}</td>`;
    wks.forEach(wk=>{h+=`<td style="border-left:1px solid var(--border)">${fmtWLT(t[wk])}</td>`;});
    h+="</tr>";
  });
  h+="</tbody>";document.getElementById("tblPower").innerHTML=h;
}

function togglePowerSort(col){if(powerSortCol===col)powerSortDir*=-1;else{powerSortCol=col;powerSortDir=1;}renderPower();}

render();
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{render();renderH2H();renderPower();});
</script>
