name: Update Fantasy MLB Data

on:
  schedule:
    # Every Monday at 09:00 UTC (after weekly matchups end Sunday)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        id: update
        env:
          YAHOO_CLIENT_ID: ${{ secrets.YAHOO_CLIENT_ID }}
          YAHOO_CLIENT_SECRET: ${{ secrets.YAHOO_CLIENT_SECRET }}
          YAHOO_REFRESH_TOKEN: ${{ secrets.YAHOO_REFRESH_TOKEN }}
        run: python scripts/update_data.py

      - name: Update refresh token secret if changed
        if: steps.update.outputs.new_refresh_token
        uses: actions/github-script@v7
        with:
          script: |
            const sodium = require('tweetsodium');
            const key_res = await github.rest.actions.getRepoPublicKey({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const key = key_res.data.key;
            const key_id = key_res.data.key_id;
            const token = '${{ steps.update.outputs.new_refresh_token }}';
            const messageBytes = Buffer.from(token);
            const keyBytes = Buffer.from(key, 'base64');
            const encryptedBytes = sodium.seal(messageBytes, keyBytes);
            const encrypted = Buffer.from(encryptedBytes).toString('base64');
            await github.rest.actions.createOrUpdateRepoSecret({
              owner: context.repo.owner,
              repo: context.repo.repo,
              secret_name: 'YAHOO_REFRESH_TOKEN',
              encrypted_value: encrypted,
              key_id: key_id,
            });
            console.log('Updated YAHOO_REFRESH_TOKEN secret');

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Commit data changes if any, otherwise make a keepalive empty commit
          if git diff --staged --quiet; then
            git commit --allow-empty -m "keepalive $(date +%Y-%m-%d)"
          else
            git commit -m "Update fantasy data $(date +%Y-%m-%d)"
          fi
          git push
